# 4LDK 戸建住宅 — 全機能活用サンプル
# 南向き / 9部屋 / 明示的壁(grid_line, mm直接, grid+offset) / 多彩な開口部
#
# 平面構成（y=0が南）:
#   上段(y=7-10) : 主寝室(3間)  | ホール(1間) | 子供部屋(6間)
#   中段(y=4-7)  : 和室(3間)    | ホール(1間) | 浴室(4間)   | 収納(2間)
#   廊下(y=3-4)  : ─────────── 廊下(10間×1間) ───────────
#   下段(y=0-3)  : LDK(8間)                    | 玄関(2間)

archilang: "0.2"

site:
  orientation: south

building:
  structure: 木造軸組
  module: shaku
  stories: 1
  defaults:
    ceiling_height: 2400mm
    external_wall:
      thickness: 130mm
    internal_wall:
      partition: 90mm

rendering:
  grid_lines:
    enabled: true

geometry:
  grids:
    module: 910mm
    1F:
      x_spans: [3, 1, 4, 2]   # grid X: 0, 3, 4, 8, 10
      y_spans: [3, 1, 3, 3]   # grid Y: 0, 3, 4, 7, 10

  rooms:
    # === 下段（南側） ===
    - id: ldk
      floor: 1F
      type: LDK
      grid_rect: { x: 0, y: 0, w: 8, h: 3 }

    - id: entrance
      floor: 1F
      type: 玄関ホール
      grid_rect: { x: 8, y: 0, w: 2, h: 3 }

    # === 廊下（東西横断・910mm幅） ===
    - id: corridor
      floor: 1F
      type: 廊下
      grid_rect: { x: 0, y: 3, w: 10, h: 1 }

    # === 中段 ===
    - id: washitsu
      floor: 1F
      type: 和室
      grid_rect: { x: 0, y: 4, w: 3, h: 3 }

    - id: hall
      floor: 1F
      type: ホール
      grid_rect: { x: 3, y: 4, w: 1, h: 6 }

    - id: bath
      floor: 1F
      type: 浴室・洗面
      grid_rect: { x: 4, y: 4, w: 4, h: 3 }

    - id: closet
      floor: 1F
      type: 収納
      grid_rect: { x: 8, y: 4, w: 2, h: 3 }

    # === 上段（北側） ===
    - id: master_bed
      floor: 1F
      type: 主寝室
      grid_rect: { x: 0, y: 7, w: 3, h: 3 }

    - id: child_room
      floor: 1F
      type: 子供部屋
      grid_rect: { x: 4, y: 7, w: 6, h: 3 }

  # --- 明示的壁 ---
  walls:
    mode: additive
    segments:
      # LDK内キッチンカウンター仕切り（mm直接指定 + grid_line）
      # X=5モジュール目の中間(4550mm)に短い壁、上部開放
      - id: w_kitchen_counter
        floor: 1F
        from: { x: 4550, y: 0 }
        to: { x: 4550, y: 1820 }
        thickness: 90mm
        type: internal
        grid_line: true

      # 浴室内の浴槽/洗面分離壁（grid+offset指定 + grid_line）
      # grid(4,4)から2モジュール東のライン
      - id: w_bath_partition
        floor: 1F
        from: { grid: { x: 4, y: 4 }, dx: 1820, dy: 0 }
        to: { grid: { x: 4, y: 7 }, dx: 1820, dy: 0 }
        thickness: 90mm
        type: internal
        grid_line: true

      # 収納内の棚仕切り（grid snap指定）
      - id: w_closet_shelf
        floor: 1F
        from: { grid: { x: 8, y: 5 } }
        to: { grid: { x: 10, y: 5 } }
        thickness: 90mm
        type: internal

  # --- 開口部 ---
  openings:
    # === LDK 窓 ===
    # 南面 — 大型掃き出し窓（庭に面する）
    - id: W1
      type: AW
      style: 引違い窓
      room: ldk
      wall: south
      position: center
      size: { w: 3640, h: 2000 }
      sill: 0

    # 西面 — 腰高窓（offset指定）
    - id: W2
      type: AW
      style: 引違い窓
      room: ldk
      wall: west
      position: { offset: 910 }
      size: { w: 1690, h: 1100 }
      sill: 800

    # === 和室 窓 ===
    # 西面 — 障子越し採光
    - id: W3
      type: AW
      style: 引違い窓
      room: washitsu
      wall: west
      position: center
      size: { w: 1690, h: 1100 }
      sill: 400

    # === 主寝室 窓 ===
    # 北面 — 腰窓
    - id: W4
      type: AW
      style: 引違い窓
      room: master_bed
      wall: north
      position: center
      size: { w: 1690, h: 1100 }
      sill: 800

    # 西面 — 小窓
    - id: W5
      type: AW
      style: 引違い窓
      room: master_bed
      wall: west
      position: center
      size: { w: 1200, h: 900 }
      sill: 900

    # === 子供部屋 窓 ===
    # 北面 — 腰窓
    - id: W6
      type: AW
      style: 引違い窓
      room: child_room
      wall: north
      position: center
      size: { w: 2530, h: 1100 }
      sill: 800

    # 東面 — 小窓
    - id: W7
      type: AW
      style: 引違い窓
      room: child_room
      wall: east
      position: center
      size: { w: 1200, h: 900 }
      sill: 900

    # === 浴室 窓 ===
    # 北面 — 高窓（換気用）
    - id: W8
      type: AW
      style: 引違い窓
      room: bath
      wall: north
      position: { offset: 500 }
      size: { w: 600, h: 600 }
      sill: 1400

    # === 収納 窓 ===
    # 東面 — 小窓（換気）
    - id: W9
      type: AW
      style: 引違い窓
      room: closet
      wall: east
      position: center
      size: { w: 600, h: 600 }
      sill: 1200

    # === 玄関ドア ===
    # 東面・アルミ片開き
    - id: ED1
      type: AD
      style: 片開き
      room: entrance
      wall: east
      position: { offset: 500 }
      size: { w: 900, h: 2300 }

    # === 室内ドア（connecting） ===
    # LDK ↔ 廊下
    - id: D1
      type: WD
      style: 片開き
      connects: [ldk, corridor]
      size: { w: 800, h: 2000 }

    # 玄関 ↔ 廊下
    - id: D2
      type: WD
      style: 片開き
      connects: [entrance, corridor]
      size: { w: 800, h: 2000 }

    # 廊下 ↔ ホール
    - id: D3
      type: WD
      style: 片開き
      connects: [corridor, hall]
      size: { w: 700, h: 2000 }

    # 和室 ↔ ホール
    - id: D4
      type: WD
      style: 片開き
      connects: [washitsu, hall]
      size: { w: 800, h: 2000 }

    # 浴室 ↔ ホール
    - id: D5
      type: WD
      style: 片開き
      connects: [hall, bath]
      size: { w: 700, h: 2000 }

    # 主寝室 ↔ ホール
    - id: D6
      type: WD
      style: 片開き
      connects: [hall, master_bed]
      size: { w: 800, h: 2000 }

    # 子供部屋 ↔ ホール
    - id: D7
      type: WD
      style: 片開き
      connects: [hall, child_room]
      size: { w: 800, h: 2000 }

    # 収納 ↔ 廊下
    - id: D8
      type: WD
      style: 片開き
      connects: [corridor, closet]
      size: { w: 600, h: 2000 }
