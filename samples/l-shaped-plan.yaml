# L字型間取り — 非矩形配置サンプル
# 部屋の組み合わせでL字型の外形を構成
# 北向き玄関

archilang: "0.2"

site:
  orientation: north

building:
  structure: 木造軸組
  module: shaku
  stories: 1
  defaults:
    ceiling_height: 2400mm
    external_wall:
      thickness: 130mm
    internal_wall:
      partition: 90mm

rendering:
  grid_lines:
    enabled: true

geometry:
  grids:
    module: 910mm
    1F:
      x_spans: [4, 4]
      y_spans: [3, 3, 3]

  rooms:
    # 下段全幅 — LDK
    - id: ldk
      floor: 1F
      type: LDK
      grid_rect: { x: 0, y: 0, w: 8, h: 3 }

    # 上段左 — 寝室
    - id: bedroom
      floor: 1F
      type: 寝室
      grid_rect: { x: 0, y: 3, w: 4, h: 3 }

    # 上段右 — 水回り
    - id: bath
      floor: 1F
      type: 浴室
      grid_rect: { x: 4, y: 3, w: 4, h: 3 }

    # 最上段左のみ — 書斎 (L字の突出部分)
    - id: study
      floor: 1F
      type: 書斎
      grid_rect: { x: 0, y: 6, w: 4, h: 3 }

  openings:
    # LDK 南面
    - id: W1
      type: AW
      style: 引違い窓
      room: ldk
      wall: south
      position: center
      size: { w: 3640, h: 2000 }
      sill: 0

    # LDK 東面
    - id: W2
      type: AW
      style: 引違い窓
      room: ldk
      wall: east
      position: center
      size: { w: 1690, h: 1100 }
      sill: 800

    # 書斎 西面
    - id: W3
      type: AW
      style: 引違い窓
      room: study
      wall: west
      position: center
      size: { w: 1690, h: 1100 }
      sill: 800

    # 書斎 北面
    - id: W4
      type: AW
      style: 引違い窓
      room: study
      wall: north
      position: center
      size: { w: 1690, h: 1100 }
      sill: 800

    # 寝室 ↔ LDK
    - id: D1
      type: WD
      style: 片開き
      connects: [bedroom, ldk]
      size: { w: 800, h: 2000 }

    # 浴室 ↔ LDK
    - id: D2
      type: WD
      style: 片開き
      connects: [bath, ldk]
      size: { w: 800, h: 2000 }

    # 書斎 ↔ 寝室
    - id: D3
      type: WD
      style: 片開き
      connects: [study, bedroom]
      size: { w: 800, h: 2000 }

    # 玄関（北面）
    - id: ED1
      type: AD
      style: 片開き
      room: study
      wall: north
      position: { offset: 500 }
      size: { w: 900, h: 2300 }
