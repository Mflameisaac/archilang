# U字型中庭付き住宅 — コの字型平面サンプル
# 南向き / 中庭を囲むU字型配置 / 廊下で3翼を接続
#
# 平面構成（y=0が南、中庭は南に開放）:
#   北翼(y=7-10) : 主寝室(3間) | 和室(4間)   | 子供部屋(3間)
#   廊下(y=6-7)  : ──────── 廊下(10間×1間) ────────
#   西翼(y=0-6)  : LDK(3間×6間)
#   中庭(y=0-6)  : ──── 中庭(4間×6間) ────  ← 部屋なし（外部空間）
#   東翼(y=0-6)  : 浴室・洗面(3間×3間) / 玄関ホール(3間×3間)

archilang: "0.2"

site:
  orientation: south

building:
  structure: 木造軸組
  module: shaku
  stories: 1
  defaults:
    ceiling_height: 2400mm
    external_wall:
      thickness: 130mm
    internal_wall:
      partition: 90mm

rendering:
  grid_lines:
    enabled: true

geometry:
  grids:
    module: 910mm
    1F:
      x_spans: [3, 4, 3]   # grid X: 0, 3, 7, 10
      y_spans: [3, 3, 1, 3] # grid Y: 0, 3, 6, 7, 10

  rooms:
    # === 西翼（南側） ===
    - id: ldk
      floor: 1F
      type: LDK
      grid_rect: { x: 0, y: 0, w: 3, h: 6 }

    # === 東翼（南側） ===
    - id: bath
      floor: 1F
      type: 浴室・洗面
      grid_rect: { x: 7, y: 0, w: 3, h: 3 }
      sub_rooms:
        - id: bath_tub
          type: 浴室
          seed: { x: 8, y: 1 }
        - id: wash
          type: 洗面
          seed: { x: 8, y: 2.5 }

    - id: entrance
      floor: 1F
      type: 玄関ホール
      grid_rect: { x: 7, y: 3, w: 3, h: 3 }

    # === 廊下（東西横断） ===
    - id: corridor
      floor: 1F
      type: 廊下
      grid_rect: { x: 0, y: 6, w: 10, h: 1 }

    # === 北翼 ===
    - id: master_bed
      floor: 1F
      type: 主寝室
      grid_rect: { x: 0, y: 7, w: 3, h: 3 }

    - id: washitsu
      floor: 1F
      type: 和室
      grid_rect: { x: 3, y: 7, w: 4, h: 3 }

    - id: child_room
      floor: 1F
      type: 子供部屋
      grid_rect: { x: 7, y: 7, w: 3, h: 3 }

  # --- 明示的壁 ---
  walls:
    mode: additive
    segments:
      # 浴室内の浴槽/洗面分離壁（y=0から1820mm地点）
      - id: w_bath_partition
        floor: 1F
        from: { grid: { x: 7, y: 0 }, dx: 0, dy: 1820 }
        to: { grid: { x: 10, y: 0 }, dx: 0, dy: 1820 }
        thickness: 90mm
        type: internal
        grid_line: true

  # --- 開口部 ---
  openings:
    # === LDK 窓 ===
    # 南面（大開口）
    - id: W1
      type: AW
      style: 引違い窓
      room: ldk
      wall: south
      position: center
      size: { w: 1690, h: 2000 }
      sill: 0

    # 西面
    - id: W2
      type: AW
      style: 引違い窓
      room: ldk
      wall: west
      position: center
      size: { w: 1690, h: 1100 }
      sill: 800

    # 東面（中庭側・大開口）
    - id: W3
      type: AW
      style: 引違い窓
      room: ldk
      wall: east
      position: center
      size: { w: 1690, h: 2000 }
      sill: 0

    # === 玄関ホール ===
    # 東面（玄関ドア）
    - id: ED1
      type: AD
      style: 片開き
      room: entrance
      wall: east
      position: { offset: 500 }
      size: { w: 900, h: 2300 }

    # 西面（中庭側窓）
    - id: W4
      type: AW
      style: 引違い窓
      room: entrance
      wall: west
      position: center
      size: { w: 1200, h: 1100 }
      sill: 800

    # === 浴室・洗面 ===
    # 南面（高窓）
    - id: W5
      type: AW
      style: 引違い窓
      room: bath
      wall: south
      position: center
      size: { w: 600, h: 600 }
      sill: 1400

    # 西面（中庭側・洗面窓）
    - id: W6
      type: AW
      style: 引違い窓
      room: bath
      wall: west
      position: center
      size: { w: 1200, h: 1100 }
      sill: 800

    # === 主寝室 窓 ===
    # 北面
    - id: W7
      type: AW
      style: 引違い窓
      room: master_bed
      wall: north
      position: center
      size: { w: 1690, h: 1100 }
      sill: 800

    # 西面
    - id: W8
      type: AW
      style: 引違い窓
      room: master_bed
      wall: west
      position: center
      size: { w: 1200, h: 900 }
      sill: 900

    # === 和室 窓 ===
    # 北面
    - id: W9
      type: AW
      style: 引違い窓
      room: washitsu
      wall: north
      position: center
      size: { w: 2530, h: 1100 }
      sill: 400

    # 南面（中庭側・掃き出し窓）
    - id: W10
      type: AW
      style: 引違い窓
      room: washitsu
      wall: south
      position: center
      size: { w: 2530, h: 2000 }
      sill: 0

    # === 子供部屋 窓 ===
    # 北面
    - id: W11
      type: AW
      style: 引違い窓
      room: child_room
      wall: north
      position: center
      size: { w: 1690, h: 1100 }
      sill: 800

    # 東面
    - id: W12
      type: AW
      style: 引違い窓
      room: child_room
      wall: east
      position: center
      size: { w: 1200, h: 900 }
      sill: 900

    # === 室内ドア ===
    # LDK ↔ 廊下
    - id: D1
      type: WD
      style: 片開き
      connects: [ldk, corridor]
      size: { w: 800, h: 2000 }

    # 玄関 ↔ 廊下
    - id: D2
      type: WD
      style: 片開き
      connects: [entrance, corridor]
      size: { w: 800, h: 2000 }

    # 玄関 ↔ 洗面（玄関経由で浴室にアクセス）
    - id: D3
      type: WD
      style: 片開き
      connects: [entrance, wash]
      size: { w: 700, h: 2000 }

    # 洗面 ↔ 浴室（sub_room同士）
    - id: D3b
      type: WD
      style: 片開き
      connects: [wash, bath_tub]
      size: { w: 700, h: 2000 }

    # 主寝室 ↔ 廊下
    - id: D4
      type: WD
      style: 片開き
      connects: [master_bed, corridor]
      size: { w: 800, h: 2000 }

    # 和室 ↔ 廊下
    - id: D5
      type: WD
      style: 片開き
      connects: [washitsu, corridor]
      size: { w: 800, h: 2000 }

    # 子供部屋 ↔ 廊下
    - id: D6
      type: WD
      style: 片開き
      connects: [child_room, corridor]
      size: { w: 800, h: 2000 }
