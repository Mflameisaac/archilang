# ツイン中庭住宅 — 2つの中庭を持つ大型住宅
# 南向き / パブリック中庭(西)とプライベート中庭(東) / 用途別ゾーニング
#
# 設計意図:
#   - 西中庭: LDKから眺めるパブリック中庭。来客時の見せ空間
#   - 東中庭: 浴室・書斎に面するプライベート坪庭。静かな内部空間
#   - 南翼: パブリック（玄関・LDK）+ サービス（水回り）
#   - 北翼: プライベート（寝室・子供部屋・書斎）
#
# 平面構成（y=0が南、中庭は南に開放）:
#   北翼(y=7-10) : 主寝室(4間) | WIC(3間) | 子供部屋1 | 子供部屋2 | 書斎 | ゲストルーム
#   廊下(y=6-7)  : ──────────── 廊下(20間×1間) ────────────
#   西外翼(y=0-6): 玄関+SIC                東外翼(y=0-6): 浴室・洗面脱衣(6間)
#   西中庭(y=0-6): 4間×6間                 東中庭(y=0-6): 4間×6間
#   中央翼(y=0-6): ──── LDK(6間×6間) ──── ← 両中庭に面する

archilang: "0.2"

site:
  orientation: south

building:
  structure: 木造軸組
  module: shaku
  stories: 1
  defaults:
    ceiling_height: 2400mm
    external_wall:
      thickness: 130mm
    internal_wall:
      partition: 90mm

rendering:
  grid_lines:
    enabled: true

geometry:
  grids:
    module: 910mm
    1F:
      x_spans: [3, 4, 3, 3, 4, 3]   # grid X: 0, 3, 7, 10, 13, 17, 20
      y_spans: [3, 3, 1, 3]          # grid Y: 0, 3, 6, 7, 10

  rooms:
    # === 南翼 ===

    # 西外翼 — 玄関まわり
    - id: sic
      floor: 1F
      type: シューズクローク
      grid_rect: { x: 0, y: 0, w: 3, h: 3 }

    - id: entrance
      floor: 1F
      type: 玄関ホール
      grid_rect: { x: 0, y: 3, w: 3, h: 3 }

    # 中央翼 — LDK（両中庭に面する大空間）
    - id: ldk
      floor: 1F
      type: LDK
      grid_rect: { x: 7, y: 0, w: 6, h: 6 }
      # カウンターで緩やかに分割（上部開放）
      sub_rooms:
        - id: living
          type: リビング
          seed: { x: 8.5, y: 3 }     # 西側（パブリック中庭側）
        - id: dk
          type: ダイニングキッチン
          seed: { x: 11.5, y: 3 }    # 東側（プライベート中庭側）

    # 東外翼 — 水回り（縦長1室をsub_roomsで分割）
    - id: bath
      floor: 1F
      type: 浴室・洗面脱衣
      grid_rect: { x: 17, y: 0, w: 3, h: 6 }
      sub_rooms:
        - id: bath_tub
          type: 浴室
          seed: { x: 18, y: 1.5 }    # 南側
        - id: wash
          type: 洗面脱衣室
          seed: { x: 18, y: 4.5 }    # 北側（廊下側）

    # 西中庭: x:3-7, y:0-6 （パブリック中庭 — 部屋なし）
    # 東中庭: x:13-17, y:0-6 （プライベート坪庭 — 部屋なし）

    # === 廊下 ===
    - id: corridor
      floor: 1F
      type: 廊下
      grid_rect: { x: 0, y: 6, w: 20, h: 1 }

    # === 北翼（プライベートゾーン） ===
    - id: master_bed
      floor: 1F
      type: 主寝室
      grid_rect: { x: 0, y: 7, w: 4, h: 3 }

    - id: wic
      floor: 1F
      type: ウォークインクローゼット
      grid_rect: { x: 4, y: 7, w: 3, h: 3 }

    - id: child_a
      floor: 1F
      type: 子供部屋1
      grid_rect: { x: 7, y: 7, w: 3, h: 3 }

    - id: child_b
      floor: 1F
      type: 子供部屋2
      grid_rect: { x: 10, y: 7, w: 3, h: 3 }

    - id: study
      floor: 1F
      type: 書斎
      grid_rect: { x: 13, y: 7, w: 4, h: 3 }

    - id: guest
      floor: 1F
      type: ゲストルーム
      grid_rect: { x: 17, y: 7, w: 3, h: 3 }

  # --- 明示的壁 ---
  walls:
    mode: additive
    segments:
      # LDK内カウンター仕切り（x=10、南壁から4間分。上部2間は開放）
      - id: w_ldk_counter
        floor: 1F
        from: { grid: { x: 10, y: 0 } }
        to: { grid: { x: 10, y: 4 } }
        thickness: 90mm
        type: internal
        grid_line: true

      # 浴室内の浴槽/洗面脱衣分離壁（y=3地点で完全分断）
      - id: w_bath_partition
        floor: 1F
        from: { grid: { x: 17, y: 3 } }
        to: { grid: { x: 20, y: 3 } }
        thickness: 90mm
        type: internal
        grid_line: true

  # --- 開口部 ---
  openings:
    # === LDK 窓 ===

    # 南面（掃き出し窓 — 両中庭の間）
    - id: W1
      type: AW
      style: 引違い窓
      room: ldk
      wall: south
      position: center
      size: { w: 3640, h: 2000 }
      sill: 0

    # 西面（パブリック中庭側・大開口）
    - id: W2
      type: AW
      style: 引違い窓
      room: ldk
      wall: west
      position: center
      size: { w: 1690, h: 2000 }
      sill: 0

    # 東面（プライベート中庭側・大開口）
    - id: W3
      type: AW
      style: 引違い窓
      room: ldk
      wall: east
      position: center
      size: { w: 1690, h: 2000 }
      sill: 0

    # === 玄関ホール ===

    # 東面（パブリック中庭側）
    - id: W4
      type: AW
      style: 引違い窓
      room: entrance
      wall: east
      position: center
      size: { w: 1200, h: 1100 }
      sill: 800

    # === 浴室・洗面脱衣 ===

    # 南面（浴室高窓）
    - id: W5
      type: AW
      style: 引違い窓
      room: bath
      wall: south
      position: center
      size: { w: 600, h: 600 }
      sill: 1400

    # 東面（換気用小窓）
    - id: W6
      type: AW
      style: 引違い窓
      room: bath
      wall: east
      position: { offset: 500 }
      size: { w: 600, h: 600 }
      sill: 1200

    # 西面（プライベート中庭側・洗面窓）
    - id: W7
      type: AW
      style: 引違い窓
      room: bath
      wall: west
      position: center
      size: { w: 1200, h: 1100 }
      sill: 800

    # === 主寝室 ===

    # 北面
    - id: W8
      type: AW
      style: 引違い窓
      room: master_bed
      wall: north
      position: center
      size: { w: 1690, h: 1100 }
      sill: 800

    # 西面
    - id: W9
      type: AW
      style: 引違い窓
      room: master_bed
      wall: west
      position: center
      size: { w: 1200, h: 900 }
      sill: 900

    # === ウォークインクローゼット ===

    # 北面（採光・換気用小窓）
    - id: W10
      type: AW
      style: 引違い窓
      room: wic
      wall: north
      position: center
      size: { w: 600, h: 600 }
      sill: 1200

    # === 子供部屋1 ===

    # 北面
    - id: W11
      type: AW
      style: 引違い窓
      room: child_a
      wall: north
      position: center
      size: { w: 1690, h: 1100 }
      sill: 800

    # === 子供部屋2 ===

    # 北面
    - id: W12
      type: AW
      style: 引違い窓
      room: child_b
      wall: north
      position: center
      size: { w: 1690, h: 1100 }
      sill: 800

    # === 書斎 ===

    # 北面
    - id: W13
      type: AW
      style: 引違い窓
      room: study
      wall: north
      position: center
      size: { w: 2530, h: 1100 }
      sill: 800

    # === ゲストルーム ===

    # 北面
    - id: W14
      type: AW
      style: 引違い窓
      room: guest
      wall: north
      position: center
      size: { w: 1690, h: 1100 }
      sill: 800

    # 東面
    - id: W15
      type: AW
      style: 引違い窓
      room: guest
      wall: east
      position: center
      size: { w: 1200, h: 900 }
      sill: 900

    # === 玄関ドア ===

    - id: ED1
      type: AD
      style: 片開き
      room: entrance
      wall: west
      position: { offset: 500 }
      size: { w: 900, h: 2300 }

    # === 室内ドア ===

    # 玄関 ↔ 廊下
    - id: D1
      type: WD
      style: 片開き
      connects: [entrance, corridor]
      size: { w: 800, h: 2000 }

    # 玄関 ↔ シューズクローク
    - id: D2
      type: WD
      style: 片開き
      connects: [entrance, sic]
      size: { w: 800, h: 2000 }

    # LDK ↔ 廊下
    - id: D3
      type: WD
      style: 片開き
      connects: [ldk, corridor]
      size: { w: 800, h: 2000 }

    # 洗面脱衣 ↔ 廊下
    - id: D4
      type: WD
      style: 片開き
      connects: [wash, corridor]
      size: { w: 700, h: 2000 }

    # 洗面脱衣 ↔ 浴室（sub_room同士）
    - id: D4b
      type: WD
      style: 片開き
      connects: [wash, bath_tub]
      size: { w: 700, h: 2000 }

    # 主寝室 ↔ 廊下
    - id: D5
      type: WD
      style: 片開き
      connects: [master_bed, corridor]
      size: { w: 800, h: 2000 }

    # 主寝室 ↔ WIC（直接アクセス）
    - id: D6
      type: WD
      style: 片開き
      connects: [master_bed, wic]
      size: { w: 800, h: 2000 }

    # 子供部屋1 ↔ 廊下
    - id: D7
      type: WD
      style: 片開き
      connects: [child_a, corridor]
      size: { w: 800, h: 2000 }

    # 子供部屋2 ↔ 廊下
    - id: D8
      type: WD
      style: 片開き
      connects: [child_b, corridor]
      size: { w: 800, h: 2000 }

    # 書斎 ↔ 廊下
    - id: D9
      type: WD
      style: 片開き
      connects: [study, corridor]
      size: { w: 800, h: 2000 }

    # ゲストルーム ↔ 廊下
    - id: D10
      type: WD
      style: 片開き
      connects: [guest, corridor]
      size: { w: 800, h: 2000 }
